name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dev dependencies
        run: npm ci

      - name: Lint CSS
        run: npx stylelint "assets/css/**/*.css"

      - name: Lint JS
        run: npx eslint "assets/js/**/*.js"

      - name: Lint HTML
        run: npx htmlhint index.html

      - name: Check local asset references
        run: |
          python3 - <<'EOF'
          import re, sys, pathlib

          root = pathlib.Path(".")
          html = (root / "index.html").read_text()
          refs = re.findall(r'(?:src|href)=["\']([^"\'#][^"\']*)["\']', html)
          local = [r for r in refs if not r.startswith(("http", "data:", "mailto:", "//"))]
          missing = [r for r in local if not (root / r).exists()]

          if missing:
              print("MISSING local assets:")
              for m in missing:
                  print(f"  ✗  {m}")
              sys.exit(1)
          else:
              print(f"  ✓  {len(local)} local asset references all resolve")
          EOF
